<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESIS_V22.SYS</title>
    <style>
        body { background: #020813; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #00f2ff; padding-bottom: 10px; margin-bottom: 30px; text-shadow: 0 0 10px #00f2ff; }
        .card { background: rgba(0, 242, 255, 0.05); border: 1px solid #00414d; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        input { width: 100%; background: #000; border: 1px solid #00414d; color: #00f2ff; padding: 15px; border-radius: 10px; margin: 10px 0; outline: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; background: transparent; color: #00f2ff; border: 1px solid #00f2ff; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; min-width: 140px; }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }
        .main-btn { margin-top: 10px; width: 100%; background: #00f2ff; color: #000; }
        #output { white-space: pre-wrap; color: #ffffff; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>GENESIS_V22.SYS</h1>
        <small>STATUS: OPERACIONAL // SOBRAL_NODE</small>
    </div>
    <div class="card">
        <h3>INVESTIGAÇÃO DE ALVO</h3>
        <input type="text" id="target" placeholder="USER, IP, DOMÍNIO OU CNPJ" autocomplete="off">
        <div class="btn-group">
            <button onclick="scan()">VARREDURA_ALVO</button>
            <button onclick="scan()">BUSCA_DIGITAL</button>
        </div>
        <button class="main-btn" onclick="scan()">ENVIAR / RACIOCINAR</button>
    </div>
    <div class="card">
        <div id="output">// AGUARDANDO COMANDO...</div>
    </div>
    <script>
        async function scan() {
            const val = document.getElementById('target').value;
            const out = document.getElementById('output');
            if(!val) return;
            out.innerText = "// PROCESSANDO INTELIGÊNCIA...\n";
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await res.json();
                out.innerText = data.response;
            } catch (e) { out.innerText = "ERRO DE CONEXÃO."; }
        }
    </script>
</body>
</html>
