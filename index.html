<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJETO AYZA</title>
    <style>
        body { background: #01050a; color: #00f2ff; font-family: monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        .card { background: rgba(0, 242, 255, 0.03); border: 1px solid #00414d; padding: 20px; border-radius: 10px; }
        input { width: 100%; background: #000; border: 1px solid #00414d; color: #00f2ff; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: transparent; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; cursor: pointer; width: 48%; margin: 1%; font-weight: bold; }
        button:hover { background: #00f2ff; color: #000; }
        .full-btn { width: 98%; background: #00f2ff; color: #000; margin-top: 5px; }
        #output { margin-top: 20px; padding: 15px; border: 1px solid #00414d; background: rgba(0,0,0,0.8); white-space: pre-wrap; min-height: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; letter-spacing: 5px;">PROJETO AYZA</h1>
        <div class="card">
            <input type="text" id="target" placeholder="Comando ou Alvo...">
            <button onclick="send()">ENVIAR CHAT</button>
            <button onclick="getSMS()">GERAR NÚMERO</button>
            <div id="output">// AGUARDANDO COMANDOS...</div>
        </div>
    </div>
    <script>
        const API_URL = "https://genese-v4.onrender.com"; // COLOQUE SUA URL DO RENDER AQUI

        async function send() {
            const val = document.getElementById('target').value;
            const out = document.getElementById('output');
            if(!val) return;
            out.innerText = "// PROCESSANDO...";
            try {
                const res = await fetch(API_URL + '/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await res.json();
                out.innerText = data.response || data.error;
            } catch (e) { out.innerText = "// ERRO DE CONEXÃO."; }
        }

        async function getSMS() {
            const out = document.getElementById('output');
            out.innerText = "// SOLICITANDO NÚMERO VIRTUAL...";
            try {
                const res = await fetch(API_URL + '/gerar_sms');
                const data = await res.json();
                out.innerText = "=== NÚMERO GERADO ===\nNúmero: " + data.numero + "\nStatus: " + data.status;
            } catch (e) { out.innerText = "// FALHA NO MÓDULO SMS."; }
        }
    </script>
</body>
</html>
