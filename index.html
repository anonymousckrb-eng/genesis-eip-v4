<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJETO AYZA</title>
    <style>
        body { background: #01050a; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .header { border-bottom: 2px solid #00f2ff; padding-bottom: 10px; margin-bottom: 30px; text-align: center; }
        h1 { font-size: 22px; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 15px #00f2ff; }
        .card { background: rgba(0, 242, 255, 0.03); border: 1px solid #00414d; padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #00414d; color: #fff; padding: 15px; border-radius: 12px; margin: 15px 0; outline: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; background: transparent; color: #00f2ff; border: 1px solid #00f2ff; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        .main-btn { width: 100%; background: #00f2ff; color: #000; margin-top: 10px; }
        #output { margin-top: 25px; padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; line-height: 1.6; white-space: pre-wrap; border-left: 3px solid #00f2ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PROJETO AYZA</h1>
            <small style="color: #555;">STATUS: ENCRYPTED // CORE: ACTIVE</small>
        </div>
        <div class="card">
            <input type="text" id="target" placeholder="Fale com Ayza ou insira um alvo..." autocomplete="off">
            <div class="btn-group">
                <button onclick="send()">VARREDURA</button>
                <button onclick="send()">CONVERSAR</button>
            </div>
            <button class="main-btn" onclick="send()">EXECUTAR COMANDO</button>
        </div>
        <div id="output">// SISTEMA AGUARDANDO INTERAÇÃO...</div>
    </div>
    <script>
        async function send() {
            const val = document.getElementById('target').value;
            const out = document.getElementById('output');
            if(!val) return;
            out.innerText = "// AYZA ESTÁ PENSANDO...";
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await res.json();
                out.innerText = data.response;
            } catch (e) { out.innerText = "// FALHA NA TRANSMISSÃO."; }
        }
    </script>
</body>
</html>
