<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AYZA Intelligence</title>
    <style>
        body { margin:0; display:flex; background:#01050a; color:#00f2ff; font-family:monospace; height:100-vh; }
        .sidebar { width:200px; background:#000810; padding:20px; border-right:1px solid #00414d; display:flex; flex-direction:column; gap:10px; }
        .main { flex:1; padding:30px; display:flex; flex-direction:column; gap:20px; }
        .card { background:rgba(0,242,255,0.02); border:1px solid #00414d; padding:20px; border-radius:8px; }
        button { background:transparent; color:#00f2ff; border:1px solid #00f2ff; padding:10px; cursor:pointer; font-weight:bold; }
        button:hover { background:#00f2ff; color:#000; box-shadow:0 0 15px #00f2ff; }
        #output { border:1px solid #00414d; padding:15px; min-height:100px; background:#000; white-space:pre-wrap; }
        #logs { border:1px solid #1a1a1a; height:150px; overflow-y:auto; padding:10px; font-size:11px; color:#555; background:#000; }
        .pulse { animation: p 1.5s infinite; color: #ff00ea; }
        @keyframes p { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="letter-spacing:3px">AYZA V2</h2>
        <button onclick="gerarNumero()">GERAR NÚMERO</button>
        <button onclick="document.getElementById('chat-box').scrollIntoView()">CHAT TÁTICO</button>
    </div>
    <div class="main">
        <div class="card">
            <h3>NÚCLEO DE SMS</h3>
            <div id="output">// SISTEMA AGUARDANDO...</div>
        </div>
        <div class="card" id="chat-box">
            <input type="text" id="msg" style="width:70%; background:#000; border:1px solid #00414d; color:#fff; padding:10px;" placeholder="Enviar comando...">
            <button onclick="sendChat()">EXECUTAR</button>
        </div>
        <div id="logs"></div>
    </div>
    <script>
        const API = "https://genesis-eip-v4.onrender.com/;
        let nAtual = null;
        let poll = null;

        function log(m) {
            const l = document.getElementById("logs");
            l.innerHTML += `[${new Date().toLocaleTimeString()}] ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function gerarNumero() {
            log("Iniciando varredura de servidores públicos...");
            const r = await fetch(API + "/gerar_numero");
            const d = await r.json();
            if(d.numero) {
                nAtual = d.numero;
                document.getElementById("output").innerText = "NÚMERO ATIVO: " + nAtual;
                log("Sucesso: " + nAtual);
                iniciarPolling();
            }
        }

        function iniciarPolling() {
            if(poll) clearInterval(poll);
            poll = setInterval(async () => {
                log("Monitorando tráfego de entrada...");
                document.getElementById("output").innerHTML = `${nAtual}<br><span class="pulse">AGUARDANDO SMS...</span>`;
                const r = await fetch(API + "/checar_sms/" + nAtual);
                const d = await r.json();
                if(d.codigo) {
                    log("CAPTURA REALIZADA!");
                    document.getElementById("output").innerText = "CÓDIGO: " + d.codigo;
                    clearInterval(poll);
                }
            }, 10000);
        }

        async function sendChat() {
            const m = document.getElementById("msg").value;
            log("Enviando query para o núcleo Groq...");
            const r = await fetch(API + "/chat", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({message: m})
            });
            const d = await r.json();
            document.getElementById("output").innerText = d.response;
        }
    </script>
</body>
</html>
