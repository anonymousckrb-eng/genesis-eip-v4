<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYZA - STEALTH MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0a0a0a; 
            font-family: 'Inter', sans-serif;
            color: #d1d5db;
        }
        .panel-border { 
            border: 1px solid #262626;
            background: #171717;
        }
        .log-container {
            background: #0f0f0f;
            border-left: 2px solid #404040;
        }
        .btn-stealth {
            background: #262626;
            border: 1px solid #404040;
            transition: all 0.2s;
        }
        .btn-stealth:hover {
            background: #404040;
            border-color: #525252;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center p-4">
    
    <header class="w-full max-w-5xl flex justify-between items-center mb-8 mt-2">
        <h1 class="text-2xl font-black tracking-tighter text-gray-100">AYZA <span class="text-gray-500 font-light">INTELLIGENCE</span></h1>
        <div class="text-xs font-mono text-gray-600 uppercase tracking-widest">Status: Encrypted</div>
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-6 w-full max-w-5xl">
        <button onclick="registrarLog('Iniciando protocolos de varredura...')" class="btn-stealth px-5 py-2 rounded text-sm font-bold uppercase tracking-widest">Varredura</button>
        <button onclick="registrarLog('Canal de voz seguro ativado.')" class="btn-stealth px-5 py-2 rounded text-sm font-bold uppercase tracking-widest">Conversar</button>
        <button onclick="gerarNumeroVirtual()" class="btn-stealth px-5 py-2 rounded text-sm font-bold uppercase tracking-widest text-blue-400 border-blue-900/30">Gerar SMS</button>
    </div>

    <main class="w-full max-w-5xl flex-1 flex flex-col gap-4 min-h-0">
        <div class="flex w-full gap-2">
            <input type="text" id="chatInput" placeholder="Comando para a unidade AYZA..." 
                   class="flex-1 bg-[#171717] border border-[#262626] rounded p-4 text-gray-200 focus:outline-none focus:border-gray-500"
                   onkeypress="if(event.key === 'Enter') enviarChat()">
            <button onclick="enviarChat()" class="bg-gray-200 text-black px-6 rounded font-bold hover:bg-white transition">
                ENVIAR
            </button>
        </div>

        <div id="smsStatus" class="hidden panel-border p-3 rounded text-xs font-mono text-blue-400">
            Aguardando SMS para: <span id="currentNumber" class="text-white font-bold"></span>
            <button onclick="checarSMS()" class="ml-4 underline text-gray-400 hover:text-white">Atualizar Mensagens</button>
        </div>

        <div class="text-[10px] text-gray-600 font-bold uppercase tracking-[0.2em] mb-1">System Terminal Output:</div>
        <div id="logs" class="flex-1 log-container rounded p-4 overflow-y-auto font-mono text-sm leading-relaxed">
            <div class="text-gray-600 italic">>> Kernel AYZA carregado. Aguardando entrada do operador...</div>
        </div>
    </main>

    <script>
        const logsDiv = document.getElementById('logs');
        const chatInput = document.getElementById('chatInput');
        let numeroAtivo = "";

        function registrarLog(msg, tag = 'SYS') {
            const time = new Date().toLocaleTimeString();
            const color = tag === 'YOU' ? 'text-gray-100' : (tag === 'ERR' ? 'text-red-500' : 'text-gray-500');
            logsDiv.innerHTML += `<div class="mb-2"><span class="text-gray-700">[${time}]</span> <span class="${color}">${tag}: ${msg}</span></div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        async function enviarChat() {
            const text = chatInput.value.trim();
            if(!text) return;
            registrarLog(text, 'YOU');
            chatInput.value = '';
            
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                if(res.ok) registrarLog(data.reply, 'AYZA');
                else registrarLog(JSON.stringify(data.details || data.error), 'ERR');
            } catch(e) {
                registrarLog(e.message, 'ERR');
            }
        }

        async function gerarNumeroVirtual() {
            registrarLog('Acessando gateway de números virtuais...', 'SMS');
            try {
                const res = await fetch('/gerar_numero');
                const data = await res.json();
                if(data.numero) {
                    numeroAtivo = data.numero;
                    document.getElementById('smsStatus').classList.remove('hidden');
                    document.getElementById('currentNumber').innerText = data.numero;
                    registrarLog(`Número gerado: ${data.numero}. Aguardando SMS...`, 'SMS');
                }
            } catch(e) {
                registrarLog('Falha ao gerar número.', 'ERR');
            }
        }

        async function checarSMS() {
            if(!numeroAtivo) return;
            registrarLog('Buscando novas mensagens no painel...', 'SMS');
            try {
                const res = await fetch('/checar_sms?num=' + numeroAtivo);
                const data = await res.json();
                if(data.mensagens && data.mensagens.length > 0) {
                    data.mensagens.forEach(m => registrarLog(`DE: ${m.from} | MSG: ${m.text}`, 'RECEBIDO'));
                } else {
                    registrarLog('Nenhum SMS novo detectado.', 'SMS');
                }
            } catch(e) {
                registrarLog('Erro ao checar caixa de entrada.', 'ERR');
            }
        }
    </script>
</body>
</html>
