<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Ayza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Plus Jakarta Sans', sans-serif; color: #a1a1aa; overflow: hidden; }
        .glass-card { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .ai-content { line-height: 1.8; font-size: 0.95rem; }
        .ai-content h2 { color: #fff; font-weight: 800; font-size: 1.1rem; margin: 1.5rem 0 0.5rem 0; text-transform: uppercase; letter-spacing: 0.1em; }
        .ai-content table { width: 100%; border-radius: 12px; overflow: hidden; margin: 20px 0; border: 1px solid #18181b; }
        .ai-content th { background: #121214; padding: 14px; text-align: left; font-size: 0.7rem; color: #71717a; border-bottom: 1px solid #18181b; }
        .ai-content td { padding: 14px; border-bottom: 1px solid #0f0f11; color: #d4d4d8; font-size: 0.85rem; }
        .scan-line { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #3f3f46, transparent); position: absolute; top: 0; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col max-w-2xl mx-auto">
    <header class="p-8 flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="text-sm font-black tracking-[0.4em] uppercase text-white">Projeto Ayza</h1>
            <p class="text-[9px] text-zinc-600 mt-1 tracking-widest uppercase">Gov-Intelligence Node</p>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-[9px] font-mono text-zinc-500">SECURE LINK</span>
            <div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
        </div>
    </header>

    <main class="flex-1 flex flex-col min-h-0 px-8">
        <div id="logs" class="flex-1 overflow-y-auto space-y-10 py-8 no-scrollbar">
            <div class="text-center opacity-30 text-[10px] tracking-[0.5em] py-20">Aguardando Input do Operador</div>
        </div>

        <div class="pb-10">
            <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                <button onclick="enviarChat('Gerar relatório de inteligência atual')" class="glass-card px-4 py-2 rounded-lg text-[9px] font-bold uppercase tracking-widest hover:text-white transition">Relatório</button>
                <button onclick="gerarNumeroVirtual()" class="glass-card px-4 py-2 rounded-lg text-[9px] font-bold uppercase tracking-widest text-blue-400">Interceptar SMS</button>
                <button onclick="enviarChat('Protocolo de busca GOV.BR')" class="glass-card px-4 py-2 rounded-lg text-[9px] font-bold uppercase tracking-widest text-zinc-500">GOV Search</button>
            </div>
            
            <div class="relative glass-card p-2 rounded-2xl border-white/10 group focus-within:border-white/20 transition-all shadow-2xl">
                <div class="flex gap-3 items-center">
                    <textarea id="chatInput" rows="1" placeholder="Digite aqui." 
                       class="flex-1 bg-transparent p-3 text-zinc-200 focus:outline-none resize-none text-sm leading-relaxed"
                       oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button onclick="enviarChat()" class="bg-white text-black h-11 w-11 flex items-center justify-center rounded-xl hover:scale-95 active:scale-90 transition shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const logsDiv = document.getElementById('logs');
        const chatInput = document.getElementById('chatInput');

        function addLog(msg, role) {
            const div = document.createElement('div');
            div.className = role === 'YOU' ? 'flex flex-col items-end' : 'flex flex-col items-start relative';
            const inner = document.createElement('div');
            inner.className = role === 'YOU' ? 'bg-zinc-900/50 px-5 py-3 rounded-2xl max-w-[80%] text-[13px] text-zinc-400 border border-white/5' : 'ai-content w-full opacity-0 translate-y-2 animate-in fade-in slide-in-from-bottom-2 duration-500 fill-mode-forwards';
            
            if(role === 'AYZA') {
                inner.innerHTML = `<span class="text-[8px] font-black text-zinc-600 block mb-4 uppercase tracking-[0.3em]">Neural Intel Response</span>` + marked.parse(msg);
            } else {
                inner.innerText = msg;
            }
            
            div.appendChild(inner);
            logsDiv.appendChild(div);
            logsDiv.scrollTo({ top: logsDiv.scrollHeight, behavior: 'smooth' });
        }

        async function enviarChat(forced = null) {
            const t = forced || chatInput.value.trim();
            if(!t) return;
            if(!forced) chatInput.value = '';
            chatInput.style.height = 'auto';
            addLog(t, 'YOU');
            try {
                const r = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: t})
                });
                const d = await r.json();
                addLog(d.reply, 'AYZA');
            } catch(e) { addLog("_Falha crítica na rede neural._", 'AYZA'); }
        }

        async function gerarNumeroVirtual() {
            const r = await fetch('/gerar_numero');
            const d = await r.json();
            addLog(`Solicitando gateway temporário em **${d.numero}**... Protocolo de escuta ativado.`, "AYZA");
        }

        chatInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarChat(); } });
    </script>
</body>
</html>
