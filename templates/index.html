<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projeto Ayza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #131314; font-family: 'Google Sans', sans-serif; color: #e3e3e3; margin: 0; overflow: hidden; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        
        /* Header Gemini Style */
        header { padding: 1.5rem; display: flex; justify-content: space-between; items-center: center; }
        .status-dot { width: 8px; height: 8px; background: #34a853; border-radius: 50%; box-shadow: 0 0 10px #34a853; }

        /* Chat Area */
        #chat-area { flex: 1; overflow-y: auto; padding: 0 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
        .ai-response { width: 100%; max-width: 100%; overflow-x: auto; }
        
        /* Fixed Tables */
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; min-width: 400px; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid #444746; color: #8e918f; font-weight: 500; }
        td { padding: 12px; border-bottom: 1px solid #1e1f20; }

        /* Input Bar */
        .input-wrapper { padding: 1rem 1.5rem 2rem; }
        .input-box { background: #1e1f20; border-radius: 32px; display: flex; items-end: flex-end; padding: 0.5rem 1rem; gap: 0.5rem; }
        textarea { background: transparent; border: none; color: #e3e3e3; flex: 1; padding: 0.8rem 0; resize: none; outline: none; font-size: 1rem; max-height: 200px; }
        
        /* Plus Menu */
        #plus-menu { 
            display: none; position: absolute; bottom: 100px; left: 1.5rem; 
            background: #282a2d; border-radius: 16px; width: 220px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 1000;
        }
        .menu-item { padding: 1rem; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background: #333537; border-radius: 16px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="text-xl font-normal">Projeto Ayza</h1>
            <div class="flex items-center gap-3">
                <span class="text-[10px] text-zinc-500 font-medium">SISTEMA ATIVO</span>
                <div class="status-dot"></div>
            </div>
        </header>

        <main id="chat-area" class="no-scrollbar">
            <div class="mt-20 text-center">
                <h2 class="text-4xl font-medium text-zinc-700">Olá, Criador</h2>
                <p class="text-zinc-500 mt-2">Como posso potencializar suas buscas hoje?</p>
            </div>
        </main>

        <div id="plus-menu">
            <div class="menu-item" onclick="sendQuick('Dossiê de CNPJ')"><span>🔍</span> Investigador</div>
            <div class="menu-item" onclick="sendQuick('Análise de Risco')"><span>📊</span> Inteligência de Risco</div>
            <div class="menu-item" onclick="sendQuick('Mapeamento de CEP')"><span>📍</span> Mapas</div>
        </div>

        <footer class="input-wrapper">
            <div class="input-box">
                <button onclick="toggleMenu()" class="p-3 text-zinc-400 hover:text-white">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <textarea id="mainInput" placeholder="Digite aqui." rows="1" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button onclick="handleSend()" class="p-3 text-blue-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 12 7-7 7 7M12 19V5"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const chat = document.getElementById('chat-area');
        const input = document.getElementById('mainInput');
        const menu = document.getElementById('plus-menu');

        function toggleMenu() { menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
        function sendQuick(t) { toggleMenu(); input.value = t; handleSend(); }

        function renderMsg(text, role) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'self-end bg-[#2b2d31] p-4 rounded-3xl max-w-[85%]' : 'ai-response';
            
            if(role === 'ai') {
                div.innerHTML = `<div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-blue-600 shrink-0"></div>
                    <div class="pt-1">${marked.parse(text)}</div>
                </div>`;
            } else {
                div.innerText = text;
            }
            chat.appendChild(div);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const val = input.value.trim();
            if(!val) return;
            input.value = ''; input.style.height = 'auto';
            renderMsg(val, 'user');

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: val })
            });
            const data = await res.json();
            renderMsg(data.reply, 'ai');
        }
    </script>
</body>
</html>
