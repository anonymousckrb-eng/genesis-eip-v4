<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Ayza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #09090b; font-family: 'Inter', sans-serif; color: #fafafa; }
        .glass { background: rgba(23, 23, 23, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .terminal-text { line-height: 1.6; font-size: 0.95rem; }
        .terminal-text h1, .terminal-text h2 { font-weight: 800; color: #fff; margin-top: 1rem; }
        .terminal-text strong { color: #fff; }
        .terminal-text table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85rem; }
        .terminal-text th, .terminal-text td { border: 1px solid #27272a; padding: 8px; text-align: left; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col p-4 max-w-2xl mx-auto">
    <header class="text-center mb-6 py-4">
        <h1 class="text-xl font-extrabold tracking-widest text-white uppercase">Projeto Ayza</h1>
        <div class="h-[2px] w-8 bg-zinc-800 mx-auto mt-2"></div>
    </header>

    <div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar py-2">
        <button onclick="enviarChat('Analise meu status de sistema')" class="glass whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest text-zinc-400">Status</button>
        <button onclick="enviarChat('Ativar protocolos de busca avançada')" class="glass whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest text-zinc-400">Busca</button>
        <button onclick="gerarNumeroVirtual()" class="glass whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest text-blue-400/80 border-blue-500/20">Gerar SMS</button>
    </div>

    <main class="flex-1 flex flex-col min-h-0">
        <div id="logs" class="flex-1 overflow-y-auto space-y-6 mb-4 pr-1">
            <div class="text-zinc-600 text-xs italic">Nucleo AYZA pronto. Aguardando criador.</div>
        </div>

        <div class="relative">
            <div id="smsPanel" class="hidden absolute -top-10 left-0 right-0 glass rounded-t-xl p-2 text-[10px] flex justify-between items-center text-blue-400">
                <span>ATIVO: <span id="currentNumber" class="font-bold"></span></span>
                <button onclick="checarSMS()" class="underline">ATUALIZAR</button>
            </div>
            <div class="flex gap-2 items-end glass p-2 rounded-2xl">
                <textarea id="chatInput" rows="1" placeholder="Consultar CNPJ, CEP ou conversar..." 
                   class="flex-1 bg-transparent p-3 text-zinc-200 focus:outline-none resize-none text-sm"
                   oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button onclick="enviarChat()" class="bg-white text-black p-3 rounded-xl hover:scale-95 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const logsDiv = document.getElementById('logs');
        const chatInput = document.getElementById('chatInput');
        let numAtivo = "";

        function addLog(msg, role) {
            const div = document.createElement('div');
            div.className = role === 'YOU' ? 'flex flex-col items-end' : 'flex flex-col items-start';
            const inner = document.createElement('div');
            inner.className = role === 'YOU' ? 'bg-zinc-800/50 p-3 rounded-2xl max-w-[90%] text-sm text-zinc-300' : 'terminal-text w-full text-zinc-300';
            
            if(role === 'AYZA') {
                inner.innerHTML = `<span class="text-[9px] font-black text-zinc-700 block mb-2 uppercase tracking-[0.2em]">Matrix Response</span>` + marked.parse(msg);
            } else {
                inner.innerText = msg;
            }
            
            div.appendChild(inner);
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        async function enviarChat(forced = null) {
            const t = forced || chatInput.value.trim();
            if(!t) return;
            if(!forced) chatInput.value = '';
            chatInput.style.height = 'auto';
            addLog(t, 'YOU');
            try {
                const r = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: t})
                });
                const d = await r.json();
                addLog(d.reply, 'AYZA');
            } catch(e) { addLog("Falha na sincronização.", 'AYZA'); }
        }

        async function gerarNumeroVirtual() {
            const r = await fetch('/gerar_numero');
            const d = await r.json();
            numAtivo = d.numero;
            document.getElementById('smsPanel').classList.remove('hidden');
            document.getElementById('currentNumber').innerText = numAtivo;
            addLog(`Gateway estabelecido em **${numAtivo}**.`, "AYZA");
        }

        async function checarSMS() {
            const r = await fetch('/checar_sms?num=' + numAtivo);
            const d = await r.json();
            if(d.mensagens.length > 0) d.mensagens.forEach(m => addLog(`**SMS:** ${m.text}`, "AYZA"));
            else addLog("Varredura de SMS concluída: sem pacotes novos.", "AYZA");
        }

        chatInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarChat(); } });
    </script>
</body>
</html>
