<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projeto Ayza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #131314; font-family: 'Google Sans', sans-serif; color: #e3e3e3; }
        #logs { scroll-behavior: smooth; }
        .ai-content { line-height: 1.6; font-size: 15px; color: #e3e3e3; }
        .ai-content table { width: 100%; border-collapse: collapse; margin: 12px 0; background: #1e1f20; border-radius: 8px; overflow: hidden; }
        .ai-content th { background: #333537; padding: 10px; text-align: left; font-size: 12px; }
        .ai-content td { padding: 10px; border-top: 1px solid #444746; }
        .user-msg { background: #2b2d31; padding: 12px 20px; border-radius: 24px; max-width: 85%; align-self: flex-end; }
        .plus-menu { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(10px); opacity: 0; pointer-events: none; }
        .plus-menu.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .input-container { background: #1e1f20; border-radius: 28px; transition: background 0.2s; }
        .input-container:focus-within { background: #282a2d; }
        textarea::placeholder { color: #8e918f; }
        .dot-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body class="h-[100dvh] flex flex-col max-w-3xl mx-auto">
    
    <header class="p-5 flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-xl font-medium text-[#e3e3e3]">Projeto Ayza</h1>
            <span class="text-[10px] text-[#8e918f] font-medium uppercase tracking-[0.2em]">Gov-Intelligence Node</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-purple-500 shadow-lg"></div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 space-y-8 no-scrollbar flex flex-col" id="logs">
        <div class="mt-20 text-center space-y-4">
            <h2 class="text-3xl font-medium text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-red-400">Olá, Carlos</h2>
            <p class="text-[#c4c7c5] text-lg">Como posso ajudar você hoje?</p>
        </div>
    </main>

    <footer class="p-4 pb-8 relative">
        <div id="plusMenu" class="plus-menu absolute bottom-24 left-4 w-48 glass shadow-2xl rounded-2xl border border-white/10 p-2 bg-[#1e1f20] z-50">
            <button onclick="enviarChat('Gerar Relatório completo')" class="w-full text-left p-3 hover:bg-[#333537] rounded-xl text-sm flex items-center gap-3">
                <span>📊</span> Relatório
            </button>
            <button onclick="enviarChat('Iniciar buscas avançadas')" class="w-full text-left p-3 hover:bg-[#333537] rounded-xl text-sm flex items-center gap-3">
                <span>🔍</span> Buscas
            </button>
            <button onclick="window.print()" class="w-full text-left p-3 hover:bg-[#333537] rounded-xl text-sm flex items-center gap-3">
                <span>📄</span> Exportar
            </button>
        </div>

        <div class="input-container flex items-end p-2 px-4 gap-2">
            <button onclick="togglePlusMenu()" class="p-2 text-[#e3e3e3] hover:bg-[#333537] rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <textarea id="chatInput" rows="1" placeholder="Digite aqui." 
               class="flex-1 bg-transparent py-3 text-base text-[#e3e3e3] focus:outline-none resize-none no-scrollbar"
               oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>

            <button onclick="enviarChat()" class="p-2 text-[#e3e3e3] hover:bg-[#333537] rounded-full transition" id="sendBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
        <p class="text-[10px] text-[#8e918f] text-center mt-3 px-4">A AYZA pode exibir informações imprecisas, inclusive sobre pessoas. Por isso, cheque as respostas.</p>
    </footer>

    <script>
        const logsDiv = document.getElementById('logs');
        const chatInput = document.getElementById('chatInput');
        const plusMenu = document.getElementById('plusMenu');

        function togglePlusMenu() {
            plusMenu.classList.toggle('active');
        }

        function addLog(msg, role) {
            const container = document.createElement('div');
            container.className = role === 'YOU' ? 'flex flex-col' : 'flex flex-col mb-10';
            
            const content = document.createElement('div');
            if(role === 'YOU') {
                content.className = 'user-msg';
                content.innerText = msg;
            } else {
                content.className = 'ai-content w-full py-4 px-2';
                content.innerHTML = `<div class="flex items-center gap-2 mb-4">
                    <div class="w-6 h-6 rounded-full bg-blue-500"></div>
                    <span class="font-medium text-sm">AYZA</span>
                </div>` + marked.parse(msg);
            }
            
            container.appendChild(content);
            logsDiv.appendChild(container);
            logsDiv.scrollTo({ top: logsDiv.scrollHeight, behavior: 'smooth' });
        }

        async function enviarChat(forced = null) {
            const text = forced || chatInput.value.trim();
            if(!text) return;
            plusMenu.classList.remove('active');
            if(!forced) chatInput.value = '';
            chatInput.style.height = 'auto';

            addLog(text, 'YOU');

            // Feedback de processamento
            const loading = document.createElement('div');
            loading.id = 'loading';
            loading.className = 'text-sm text-zinc-500 dot-pulse italic p-4';
            loading.innerText = 'AYZA está pensando...';
            logsDiv.appendChild(loading);

            try {
                const r = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const d = await r.json();
                document.getElementById('loading').remove();
                addLog(d.reply, 'AYZA');
            } catch(e) { 
                if(document.getElementById('loading')) document.getElementById('loading').remove();
                addLog("Desculpe, ocorreu um erro na conexão.", 'AYZA'); 
            }
        }

        chatInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarChat(); } });
    </script>
</body>
</html>
