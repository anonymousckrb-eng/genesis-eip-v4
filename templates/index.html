<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Ayza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0c0c0e; font-family: 'Plus Jakarta Sans', sans-serif; color: #e4e4e7; overflow: hidden; }
        .glass-panel { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .ai-text { line-height: 1.7; font-size: 0.95rem; color: #d4d4d8; }
        .ai-text h2 { color: #fff; font-weight: 700; margin-top: 1.5rem; border-left: 3px solid #3f3f46; padding-left: 10px; }
        .ai-text table { width: 100%; margin: 15px 0; border-radius: 8px; overflow: hidden; border: 1px solid #27272a; }
        .ai-text th { background: #18181b; padding: 12px; font-size: 0.75rem; text-transform: uppercase; color: #a1a1aa; }
        .ai-text td { padding: 12px; border-top: 1px solid #27272a; }
        .btn-action { background: #18181b; border: 1px solid #27272a; transition: 0.2s; }
        .btn-action:hover { background: #27272a; border-color: #3f3f46; color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col max-w-2xl mx-auto border-x border-white/5">
    
    <header class="p-6 flex justify-between items-center">
        <h1 class="text-lg font-extrabold tracking-tighter uppercase text-white">Projeto Ayza</h1>
        <div class="flex gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Enclave Securo</span>
        </div>
    </header>

    <div class="flex gap-2 px-6 mb-4 overflow-x-auto no-scrollbar">
        <button onclick="enviarChat('Relatório de Diagnóstico')" class="btn-action whitespace-nowrap px-4 py-2 rounded-xl text-[10px] font-bold text-zinc-400">Diagnóstico</button>
        <button onclick="gerarNumeroVirtual()" class="btn-action whitespace-nowrap px-4 py-2 rounded-xl text-[10px] font-bold text-blue-400">Interceptar SMS</button>
        <button onclick="window.print()" class="btn-action whitespace-nowrap px-4 py-2 rounded-xl text-[10px] font-bold text-zinc-400">Exportar</button>
    </div>

    <main class="flex-1 flex flex-col min-h-0 px-6">
        <div id="logs" class="flex-1 overflow-y-auto space-y-8 pr-1 no-scrollbar pb-10">
            <div class="text-zinc-700 text-[10px] tracking-[0.3em] uppercase text-center py-10 border-b border-white/5">Sistemas Operacionais v3.0 // Ready</div>
        </div>

        <div class="pb-8 bg-gradient-to-t from-[#0c0c0e] via-[#0c0c0e] to-transparent">
            <div id="smsPanel" class="hidden glass-panel rounded-t-2xl p-4 mb-0 border-b-0 animate-bounce">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black text-blue-500 tracking-widest uppercase">Número Virtual Ativo</span>
                    <span id="currentNumber" class="text-white font-mono text-sm"></span>
                </div>
            </div>
            <div class="flex gap-3 items-end glass-panel p-3 rounded-2xl shadow-2xl">
                <textarea id="chatInput" rows="1" placeholder="Digite aqui." 
                   class="flex-1 bg-transparent p-2 text-zinc-100 focus:outline-none resize-none text-sm leading-relaxed"
                   oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button onclick="enviarChat()" class="bg-white text-black h-10 w-10 flex items-center justify-center rounded-xl hover:scale-95 active:scale-90 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const logsDiv = document.getElementById('logs');
        const chatInput = document.getElementById('chatInput');
        let numAtivo = "";

        function addLog(msg, role) {
            const div = document.createElement('div');
            div.className = role === 'YOU' ? 'flex flex-col items-end' : 'flex flex-col items-start';
            const inner = document.createElement('div');
            inner.className = role === 'YOU' ? 'bg-zinc-900 px-4 py-3 rounded-2xl max-w-[85%] text-[13px] border border-white/5' : 'ai-text w-full';
            
            if(role === 'AYZA') {
                inner.innerHTML = `<span class="text-[9px] font-black text-zinc-600 block mb-3 uppercase tracking-[0.2em]">Ayza Analyst</span>` + marked.parse(msg);
            } else {
                inner.innerText = msg;
            }
            
            div.appendChild(inner);
            logsDiv.appendChild(div);
            logsDiv.scrollTo({ top: logsDiv.scrollHeight, behavior: 'smooth' });
        }

        async function enviarChat(forced = null) {
            const t = forced || chatInput.value.trim();
            if(!t) return;
            if(!forced) chatInput.value = '';
            chatInput.style.height = 'auto';
            addLog(t, 'YOU');
            try {
                const r = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: t})
                });
                const d = await r.json();
                addLog(d.reply, 'AYZA');
            } catch(e) { addLog("_Falha na sincronização de dados._", 'AYZA'); }
        }

        async function gerarNumeroVirtual() {
            const r = await fetch('/gerar_numero');
            const d = await r.json();
            numAtivo = d.numero;
            document.getElementById('smsPanel').classList.remove('hidden');
            document.getElementById('currentNumber').innerText = numAtivo;
            addLog(`**Protocolo de Interceptação Iniciado.**\nNúmero Alocado: \`${numAtivo}\`\nAguardando pacotes de dados de entrada...`, "AYZA");
        }

        chatInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarChat(); } });
    </script>
</body>
</html>
