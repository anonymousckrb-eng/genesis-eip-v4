<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AYZA Intelligence</title>

<style>
body { background:black; color:#00f2ff; font-family:monospace; }
button { background:black; color:#00f2ff; border:1px solid #00f2ff; padding:10px; cursor:pointer; }
#output { margin-top:20px; border:1px solid #00f2ff; padding:10px; }
</style>

</head>
<body>

<h1>AYZA INTELLIGENCE</h1>

<button onclick="gerarNumero()">GERAR NÚMERO</button>

<div id="output"></div>

<script>
const API = window.location.origin;

async function gerarNumero(){
    const r = await fetch(API + "/gerar_numero");
    const data = await r.json();

    document.getElementById("output").innerText =
        data.numero || JSON.stringify(data);
}
</script>

</body>
</html>
